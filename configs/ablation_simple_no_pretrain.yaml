# =============================================================================
# Configuration: v34.1b Ablation 3 - No Pretraining + Simple Head
# =============================================================================
#
# ABLATION STUDY: Complete ablation (worst case baseline)
# ========================================================
# This config removes BOTH:
# 1. Pretraining on 66M unpaired sequences
# 2. Multihead sequential architecture
#
# It serves as the "worst case" baseline in the 2x2 factorial design:
#
#                     │  Multihead (Full)  │  Simple LM Head  │
# ────────────────────┼────────────────────┼──────────────────┤
# With Pretraining    │  v34.1b (Best)     │  Ablation 2      │
# ────────────────────┼────────────────────┼──────────────────┤
# No Pretraining      │  Ablation 1        │  Ablation 3 ←    │
# ────────────────────┴────────────────────┴──────────────────┘
#
# Key Differences:
# ----------------
# | Parameter                  | v34.1b (baseline) | Ablation 3 (this) |
# |----------------------------|-------------------|-------------------|
# | pretrained_checkpoint_path | v34 checkpoint    | null (random)     |
# | use_multihead_architecture | true              | FALSE             |
# | loss_type                  | focal_loss        | focal_loss        |
# | use_germline_genes         | true              | FALSE             |
# | use_region_embedding       | true              | FALSE             |
# | All NGL features           | enabled           | DISABLED          |
#
# Architecture:
# -------------
# Simple ESM2 LM Head (random initialization):
#   ESM2 Backbone (random) → Dense(480→480) → GELU → LayerNorm → Linear(480→53)
#
# Loss: Focal Loss only (standard MLM, no multi-task, no NGL weighting)
#
# Expected Impact:
# ----------------
# - Worst performance expected (no transfer learning, no specialized heads)
# - Serves as lower bound for ablation comparison
# - Difference from Ablation 1: measures architecture contribution w/o pretrain
# - Difference from Ablation 2: measures pretraining contribution w/o multihead
#
# =============================================================================

# NO pretrained checkpoint - start from random ESM2 weights
# pretrained_checkpoint_path: null  # Explicitly omitted

# Data configuration (SAME as v34.1b - paired data)
data:
  data_path: "/path/to/prism/data/unpaired_OAS/annotated_data_final/paired_with_clusters_filtered_ngl_split.parquet"
  mask_prob: 0.15
  num_workers: 0
  batch_size: 256
  lazy_loading: true
  enable_sharding: true
  val_sample_ratio: 0.1

# Model configuration
model:
  model_identifier: "esm2_t12_35M_UR50D"
  num_unfrozen_transformer_blocks: 12
  random_weights: true  # Start from random weights
  add_custom_tokens: true
  custom_token_strategy: "lowercase_ngl"  # Still use 53-token vocab
  activation_function: "swiglu"

  # ==========================================================================
  # [ABLATION 3] SIMPLE HEAD - No multihead architecture
  # ==========================================================================
  use_multihead_architecture: false

  # These are ignored when use_multihead_architecture=false
  aa_loss_weight: 1.0
  aa_focal_gamma: 2.0
  aa_loss_ngl_weight: 1.0
  mut_loss_weight: 1.0
  mut_focal_gamma: 2.0
  origin_focal_gamma: 2.0
  ngl_loss_alpha: 1.0
  use_alpha_gating: false
  final_loss_weight: 1.0
  use_multiplicative_gating: false
  gating_temperature: 1.0
  gating_temperature_warmup_steps: 0
  detach_origin_gradient: false
  origin_head_dropout: 0.0

  # Architecture Controls
  tie_word_embeddings: false
  use_lora: false
  lora_r: 4
  lora_alpha: 1
  lora_dropout: 0.0

  # ==========================================================================
  # [ABLATION 3] NO CONDITIONING - Pure vanilla protein language model
  # ==========================================================================
  use_germline_genes: false
  gene_embedding_dim: 64
  gene_embedding_dropout: 0.1
  use_region_embedding: false
  num_regions: 8
  region_embedding_dim: 32

  # Disabled features
  use_biophysical_features: false
  use_position_aware_genes: false

  # ==========================================================================
  # [ABLATION 3] NO REGION-BASED FEATURES
  # ==========================================================================
  use_region_balanced_loss: false
  use_region_masking: false
  cdr_mask_prob: 0.15
  fr_mask_prob: 0.15

  # CDR Loss Boosting - DISABLED
  use_cdr_loss_boosting: false
  cdr_loss_multiplier: 1.0

  # Legacy GL/NGL Classification - DISABLED
  use_glngl_classification: false
  glngl_loss_weight: 0.1
  glngl_focal_gamma: 2.0
  glngl_focal_alpha: 0.75

  # NGL-targeted masking - DISABLED
  ngl_targeted_masking: false
  ngl_mask_prob: 0.15

  # NGL Masking Schedule - DISABLED
  ngl_mask_schedule:
    enabled: false
    start_prob: 0.15
    end_prob: 0.15
    start_step: 0
    end_step: 1000

# Training hyperparameters
# Learning rate: 4e-4 (training from scratch, no pretrained checkpoint)
training:
  seed: 42
  peak_learning_rate: 0.0004  # 4e-4 (training from scratch)
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  weight_decay: 0.01
  warmup_steps: 500
  max_steps: 15000
  logging_steps: 10
  eval_steps: 20
  loss_type: "focal_loss"  # [ABLATION 3] Use focal loss (same as baseline)
  gradient_accumulation_steps: 16  # 256 * 16 * 2 = 8192 effective batch
  gradient_clip_val: 1.0
  gradient_clip_algorithm: "norm"

# PyTorch Lightning trainer configuration
trainer:
  devices: 2
  accelerator: "gpu"
  precision: "bf16-mixed"
  strategy: "ddp_find_unused_parameters_true"
  compile: false
  compile_mode: "reduce-overhead"

# Logging configuration
logging:
  output_dir: "outputs"
  experiment_name: "ESM2_v34.1b_ablation3_simple_no_pretrain"

# Checkpointing configuration
checkpointing:
  top_k: 3
  monitor: "val/ppl_all"
  mode: "min"

# Early stopping configuration
early_stopping:
  enabled: true
  patience: 50
  monitor: "val/ppl_all"

# Developability tracking configuration
developability_tracking:
  enabled: true
  data_path: "/path/to/prism/data/ginkgo/developability_data.csv"
  eval_every_n: 10
  sample_size: 100
